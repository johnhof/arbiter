name: Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for tests to pass
        env:
          GH_TOKEN: ${{ github.token }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          for i in $(seq 1 30); do
            STATUS=$(gh api "repos/${REPO}/commits/${COMMIT_SHA}/check-runs" \
              --jq '.check_runs[] | select(.name == "test") | .conclusion' 2>/dev/null || echo "pending")
            if [ "$STATUS" = "success" ]; then
              echo "Tests passed"
              exit 0
            elif [ "$STATUS" = "failure" ] || [ "$STATUS" = "cancelled" ]; then
              echo "Tests failed or cancelled — skipping version bump"
              exit 1
            fi
            echo "Waiting for tests... (attempt $i/30)"
            sleep 10
          done
          echo "Timed out waiting for tests"
          exit 1

      - name: Determine version bump
        id: bump
        run: |
          # Get the latest tag, default to 0.0.0 if none exist
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          # Analyze commits since last tag
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commit prefixes
          # BREAKING CHANGE or feat!: -> major
          # feat: -> minor
          # fix:, chore:, docs:, style:, refactor:, perf:, test:, ci: -> patch
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            BUMP="minor"
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP: $LATEST_TAG -> $NEW_VERSION"

      - name: Create tag
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Summary
        if: steps.bump.outputs.skip != 'true'
        run: |
          echo "### Version Bump" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Previous | ${{ steps.bump.outputs.latest }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New | ${{ steps.bump.outputs.new }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump | ${{ steps.bump.outputs.bump }} |" >> "$GITHUB_STEP_SUMMARY"
