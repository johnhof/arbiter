name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --reporter=json 2>/dev/null | tee test-results.json
        env:
          CI: true

      - name: Generate coverage report
        if: always()
        run: npx c8 report --temp-directory=./coverage/tmp --reporter=json-summary --report-dir=./coverage 2>/dev/null || true

      - name: Generate test summary
        if: always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            TEST_PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            TEST_PERCENT=0
          fi
          COV_PERCENT=$(jq '.total.lines.pct // 0 | floor' coverage/coverage-summary.json 2>/dev/null || echo 0)
          echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | Failed | Total | Rate | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| $PASSED | $FAILED | $TOTAL | ${TEST_PERCENT}% | ${COV_PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            TEST_PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            TEST_PERCENT=0
          fi
          if [ "$TEST_PERCENT" -ge 90 ]; then TEST_COLOR="brightgreen"
          elif [ "$TEST_PERCENT" -ge 70 ]; then TEST_COLOR="yellow"
          else TEST_COLOR="red"
          fi
          COV_PERCENT=$(jq '.total.lines.pct // 0 | floor' coverage/coverage-summary.json 2>/dev/null || echo 0)
          if [ "$COV_PERCENT" -ge 80 ]; then COV_COLOR="brightgreen"
          elif [ "$COV_PERCENT" -ge 60 ]; then COV_COLOR="yellow"
          else COV_COLOR="red"
          fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/tests-${TEST_PERCENT}%25_passing_(${PASSED}/${TOTAL})-${TEST_COLOR}" > .github/badges/tests.svg
          curl -s "https://img.shields.io/badge/coverage-${COV_PERCENT}%25-${COV_COLOR}" > .github/badges/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/tests.svg .github/badges/coverage.svg
          if ! git diff --cached --quiet; then
            git commit -m "ci: update test badges [skip ci]"
            git push
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  version:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new-version: ${{ steps.bump.outputs.new }}
      skipped: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # feat!: or BREAKING CHANGE -> major
          # feat: -> minor
          # fix:, chore:, docs:, etc -> patch
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE "^(feat|feature)(\(.+\))?:"; then
            BUMP="minor"
          fi

          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bumping $BUMP: $LATEST_TAG -> $NEW_VERSION"

      - name: Create tag
        if: steps.bump.outputs.skip != 'true'
        env:
          NEW_TAG: ${{ steps.bump.outputs.new }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"

      - name: Summary
        if: steps.bump.outputs.skip != 'true'
        env:
          PREV: ${{ steps.bump.outputs.latest }}
          NEW: ${{ steps.bump.outputs.new }}
          BUMP: ${{ steps.bump.outputs.bump }}
        run: |
          echo "### Version Bump" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Previous | $PREV |" >> "$GITHUB_STEP_SUMMARY"
          echo "| New | $NEW |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bump | $BUMP |" >> "$GITHUB_STEP_SUMMARY"

  publish:
    needs: [version]
    if: github.ref == 'refs/heads/main' && needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Set version from tag
        env:
          NEW_VERSION: ${{ needs.version.outputs.new-version }}
        run: npm version "${NEW_VERSION#v}" --no-git-tag-version

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
