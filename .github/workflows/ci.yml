name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --reporter=json > test-results.json 2>/dev/null || true
        env:
          CI: true

      - name: Check test results
        run: |
          if ! jq -e '.stats' test-results.json >/dev/null 2>&1; then
            echo "Failed to parse test results"
            exit 1
          fi
          jq '.stats' test-results.json
          UNEXPECTED=$(jq '.stats.unexpected' test-results.json)
          if [ "$UNEXPECTED" -gt 0 ]; then
            echo "Tests failed: $UNEXPECTED unexpected"
            exit 1
          fi

      - name: Generate coverage report
        if: always()
        run: |
          if [ -d "./coverage/tmp" ]; then
            npx c8 report --temp-directory=./coverage/tmp --reporter=json-summary --report-dir=./coverage --src=.
          else
            echo "No coverage data found in ./coverage/tmp"
          fi

      - name: Generate test summary
        if: always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            TEST_PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            TEST_PERCENT=0
          fi
          COV_PERCENT=$(jq '.total.lines.pct // 0 | floor' coverage/coverage-summary.json 2>/dev/null || echo 0)
          echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | Failed | Total | Rate | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-------|------|----------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| $PASSED | $FAILED | $TOTAL | ${TEST_PERCENT}% | ${COV_PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            TEST_PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            TEST_PERCENT=0
          fi
          if [ "$TEST_PERCENT" -ge 90 ]; then TEST_COLOR="brightgreen"
          elif [ "$TEST_PERCENT" -ge 70 ]; then TEST_COLOR="yellow"
          else TEST_COLOR="red"
          fi
          COV_PERCENT=$(jq '.total.lines.pct // 0 | floor' coverage/coverage-summary.json 2>/dev/null || echo 0)
          if [ "$COV_PERCENT" -ge 80 ]; then COV_COLOR="brightgreen"
          elif [ "$COV_PERCENT" -ge 60 ]; then COV_COLOR="yellow"
          else COV_COLOR="red"
          fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/tests-${TEST_PERCENT}%25_passing_(${PASSED}/${TOTAL})-${TEST_COLOR}" > .github/badges/tests.svg
          curl -s "https://img.shields.io/badge/coverage-${COV_PERCENT}%25-${COV_COLOR}" > .github/badges/coverage.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/tests.svg .github/badges/coverage.svg
          if ! git diff --cached --quiet; then
            git commit -m "ci: update test badges [skip ci]"
            git push
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  publish:
    needs: [test]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          TAG="v${PKG_VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — nothing to publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "New version $TAG"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v5
        if: steps.check.outputs.skip != 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Tag and publish
        if: steps.check.outputs.skip != 'true'
        env:
          TAG: ${{ steps.check.outputs.tag }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          npm publish --access public
          echo "### Published $TAG to npm" >> "$GITHUB_STEP_SUMMARY"
