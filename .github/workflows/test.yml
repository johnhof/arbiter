name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run tests
        run: npx playwright test --reporter=json 2>/dev/null | tee test-results.json
        env:
          CI: true

      - name: Generate test summary
        if: always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            PERCENT=0
          fi
          echo "### Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | Failed | Total | Rate |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| $PASSED | $FAILED | $TOTAL | ${PERCENT}% |" >> "$GITHUB_STEP_SUMMARY"

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && always()
        run: |
          PASSED=$(jq '.stats.expected' test-results.json 2>/dev/null || echo 0)
          FAILED=$(jq '.stats.unexpected' test-results.json 2>/dev/null || echo 0)
          TOTAL=$((PASSED + FAILED))
          if [ "$TOTAL" -gt 0 ]; then
            PERCENT=$(( PASSED * 100 / TOTAL ))
          else
            PERCENT=0
          fi
          if [ "$PERCENT" -ge 90 ]; then COLOR="brightgreen"
          elif [ "$PERCENT" -ge 70 ]; then COLOR="yellow"
          else COLOR="red"
          fi
          mkdir -p .github/badges
          curl -s "https://img.shields.io/badge/tests-${PERCENT}%25_passing_(${PASSED}/${TOTAL})-${COLOR}" > .github/badges/tests.svg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/badges/tests.svg
          if ! git diff --cached --quiet; then
            git commit -m "ci: update test badge [skip ci]"
            git push
          fi

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          retention-days: 7
